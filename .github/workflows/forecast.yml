name: Forecast & COT

on:
  schedule:
    # Daily at 06:00 UTC Mon-Fri
    - cron: '0 6 * * 1-5'
    # Also Sunday 20:00 UTC (weekly preview)
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forecast layer
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:    ${{ secrets.TWELVEDATA_KEY }}
          OLLAMA_API_KEY:    ${{ secrets.OLLAMA_API_KEY }}
        run: python main.py --layer forecast

      - name: Commit dashboard + state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/ || true
          git diff --staged --quiet || git commit -m "chore: update dashboard + state [skip ci]"
          git push || true
