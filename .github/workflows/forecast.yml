name: "[DEPRECATED] Forecast & COT"

# forecast_engine.py was deprecated in the gold-only rebuild — replaced by
# gold_engine.run_gold_bias(), which now runs as part of pipeline.yml's
# chain. Manual-only no-op, kept only so the Actions tab explains why the
# old forecast job disappeared. Delete this file yourself whenever
# convenient.
on:
  workflow_dispatch:

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deprecation
        run: |
          echo "forecast.yml is deprecated. forecast_engine.py was replaced"
          echo "by gold_engine.run_gold_bias(), which runs inside pipeline.yml."
          echo "Use 'Run workflow' on the Gold Pipeline workflow instead, or"
          echo "run 'python main.py --layer gold_bias' locally."
