name: Gold Pipeline

on:
  schedule:
    # Every 30min, 07-16 UTC weekdays — spans both killzones (London 07-10,
    # NY 12-16) plus the gap between them, since gold_bias/gold_swing aren't
    # session-gated even though gold_scalp only fires inside a killzone.
    # Runs the full chain as ONE job so every step sees the previous step's
    # fresh output:
    #   COT -> Macro (Gemini) -> Gold Bias -> Gold Scalp -> Gold Swing
    #   -> Performance (audits the run, updates the daily-loss circuit breaker)
    # This replaces the old 9-asset/5-engine chain (scalp/swing/council/
    # forecast/deep_pipeline) entirely — those files are deprecated stubs,
    # their workflows below are manual-only relics kept for reference.
    #
    # Offset to :08/:38 instead of :00/:30 — GitHub's own docs warn that
    # scheduled workflows queued at the top of the hour (and other round
    # minute marks) get delayed or silently dropped during high platform
    # load, since that's when the largest number of repos across GitHub
    # fire their cron jobs. This matches the multi-hour gaps we kept seeing
    # in the commit history with no code-side explanation.
    - cron: '8,38 7-16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run gold pipeline
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:    ${{ secrets.TWELVEDATA_KEY }}
          OLLAMA_API_KEY:    ${{ secrets.OLLAMA_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit dashboard + state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: pipeline run [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep $((RANDOM % 10 + 5))
            done
          fi
