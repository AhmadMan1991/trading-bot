name: Sequential Pipeline

on:
  schedule:
    # Every 2h during sessions, 07-19 UTC weekdays. Runs the FULL chain as one
    # job so every step genuinely sees the previous step's fresh output:
    #   COT -> Macro (Gemini) -> Forecast -> Swing -> Scalp -> Council
    #   -> Deep Pipeline (9 assets) -> Performance (audits the run)
    # This replaces scalp.yml / swing.yml / council.yml / forecast.yml /
    # btc_deep.yml / performance.yml running as separate, independently
    # scheduled workflows — those are kept as manual-only (workflow_dispatch)
    # for standalone testing of a single step, but no longer fire on a cron
    # of their own, so there's exactly one scheduler touching the repo at
    # a time (the project's own past incident with two schedulers double-
    # firing signals is exactly what this avoids).
    - cron: '0 7,9,11,13,15,17,19 * * 1-5'
  workflow_dispatch:
    inputs:
      council-mode:
        description: 'Council mode: scalp or swing'
        required: false
        default: 'scalp'

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full sequential pipeline
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:    ${{ secrets.TWELVEDATA_KEY }}
          OLLAMA_API_KEY:    ${{ secrets.OLLAMA_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: python main.py --council-mode ${{ github.event.inputs.council-mode || 'scalp' }}

      - name: Commit dashboard + state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: pipeline run [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep $((RANDOM % 10 + 5))
            done
          fi
