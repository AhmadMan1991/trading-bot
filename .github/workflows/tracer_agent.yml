name: Tracer (Live Position Updates)

on:
  schedule:
    # Every 15 minutes during session hours — offset :05/:20/:35/:50 so it
    # doesn't collide with pipeline.yml's :00/:30 gold-chain runs.
    - cron: '5,20,35,50 7-20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tracer:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracer layer
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:    ${{ secrets.TWELVEDATA_KEY }}
        run: python main.py --layer tracer

      - name: Commit dashboard + state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: tracer update [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying..."
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 10 + 5))
            done
          fi
