name: USD Red-Folder News Agent

on:
  schedule:
    # Every 5 minutes through both London+NY sessions, Mon-Fri.
    # Each run is a cheap calendar check (no chart rendering, no full market
    # scan), so this cadence is fine cost-wise even though it's frequent.
    #
    # Offset to :03/:08/:13/... instead of :00/:05/:10/... — GitHub delays
    # or silently drops scheduled runs queued at round minute marks during
    # high platform load, since that's when the most repos across GitHub
    # fire cron jobs simultaneously. This lines up with the multi-hour gaps
    # we saw with no code-side explanation.
    - cron: '3-58/5 6-22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news_agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news agent layer
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --layer news

      - name: Commit dashboard + state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: news agent state [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying..."
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 10 + 5))
            done
          fi
