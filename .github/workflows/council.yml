name: "[DEPRECATED] Council (7-Agent)"

# council.py was removed entirely in the gold-only rebuild, by design: its
# multi-agent voting/veto model was diagnosed as a cause of the debate-gated
# NO_TRADE deadlock. gold_engine.py's additive confluence scoring has no
# direct replacement job — it's just part of gold_scalp/gold_swing in
# pipeline.yml. Manual-only no-op, kept only so the Actions tab explains why
# the old council job disappeared. Delete this file yourself whenever
# convenient.
on:
  workflow_dispatch:

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deprecation
        run: |
          echo "council.yml is deprecated. council.py's multi-agent voting"
          echo "was replaced by gold_engine.py's additive confluence scoring"
          echo "(no separate council step — see pipeline.yml)."
