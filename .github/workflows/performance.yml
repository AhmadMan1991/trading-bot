name: Performance Tracker (manual — standalone step test)

# Superseded by pipeline.yml, which now runs this as step 8 (last) of every
# 2h chain run, 07-19 UTC weekdays — a shorter, more frequent audit cadence
# than the old once-daily 22:00 UTC run, so open TP1/TP2/STOP resolution
# gets checked more often, not less. No schedule here anymore — use
# "Run workflow" in the Actions tab to test in isolation.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve open signals
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:    ${{ secrets.TWELVEDATA_KEY }}
        run: python main.py --layer performance

      - name: Commit dashboard + state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "perf: resolve open signals [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep $((RANDOM % 10 + 5))
            done
          fi
