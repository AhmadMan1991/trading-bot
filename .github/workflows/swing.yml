name: Swing Scanner

on:
  schedule:
    # "4 hours analysis" — every 4h, offset :10 so it never lands on scalp's
    # :01/:16/:31/:46 marks or council's :20/:35 marks below.
    - cron: '10 0,4,8,12,16,20 * * 1-5'
  workflow_dispatch:

jobs:
  swing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run swing layer
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:    ${{ secrets.TWELVEDATA_KEY }}
          OLLAMA_API_KEY:    ${{ secrets.OLLAMA_API_KEY }}
        run: python main.py --layer swing

      - name: Commit dashboard + state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: update dashboard + state [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep $((RANDOM % 10 + 5))
            done
          fi
