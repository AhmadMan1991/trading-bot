name: BTC Deep Pipeline (legacy, manual only)

# Superseded by deep_pipeline.py, which generalizes this same TA/Sentiment/
# Synthesis/4-layer-risk engine to all 9 configured assets and runs as step 7
# of pipeline.yml's sequential chain (see scalp.yml for the full note on why
# there's no schedule here anymore). This BTC-only version is kept only for
# manual side-by-side comparison against the generalized version — use
# "Run workflow" in the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  btc_deep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BTC deep-pipeline layer
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY:    ${{ secrets.TWELVEDATA_KEY }}
          OLLAMA_API_KEY:    ${{ secrets.OLLAMA_API_KEY }}
        run: python main.py --layer btc_deep

      - name: Commit dashboard + state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: update dashboard + state [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep $((RANDOM % 10 + 5))
            done
          fi
