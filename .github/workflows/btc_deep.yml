name: "[DEPRECATED] BTC Deep Pipeline"

# btc_deep_pipeline.py (and its generalized successor deep_pipeline.py) were
# both deprecated in the gold-only rebuild. The project no longer trades
# BTC at all; see gold_engine.py for the XAUUSD-only ICT/SMC replacement.
# Manual-only no-op, kept only so the Actions tab explains why the old BTC
# job disappeared. Delete this file yourself whenever convenient.
on:
  workflow_dispatch:

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deprecation
        run: |
          echo "btc_deep.yml is deprecated. BTC is no longer traded by this"
          echo "project — see gold_engine.py for the gold-only ICT/SMC engine."
