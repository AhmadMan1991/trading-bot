name: "[DEPRECATED] Scalp Scanner"

# scalp_engine.py was deprecated in the gold-only rebuild — its scalp scan
# logic was replaced by gold_engine.run_gold_scalp(), which now runs as part
# of pipeline.yml's chain. This workflow is a manual-only no-op kept so the
# Actions tab still shows why the old scalp job disappeared. Delete this
# file yourself whenever convenient — the sandbox that authored these
# changes can't delete files in your local project folder.
on:
  workflow_dispatch:

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deprecation
        run: |
          echo "scalp.yml is deprecated. scalp_engine.py was replaced by"
          echo "gold_engine.run_gold_scalp(), which runs inside pipeline.yml."
          echo "Use 'Run workflow' on the Gold Pipeline workflow instead, or"
          echo "run 'python main.py --layer gold_scalp' locally."
